name: release-please
on:
  push:
    branches: [main, beta]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Per-branch behavior (stable on main, prerelease on beta) is
          # driven by .release-please-manifest.json + release-please-config.json.
          target-branch: ${{ github.ref_name }}
