name: CI
on:
  push:
    branches: [main, beta, dev]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch full history + tags so test_upgrade_path can `git show <tag>`.
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest tests/ -v

  # Aggregate check used by branch protection so a single required status
  # covers the whole matrix.
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Verify all matrix jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test job result: ${{ needs.test.result }}"
            exit 1
          fi

  # Promotion guard: PRs into beta must come from dev (or hotfix/*); PRs
  # into main must come from beta (or hotfix/*).
  promotion-guard:
    name: promotion-guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'beta' || github.base_ref == 'main')
    steps:
      - name: Enforce promotion path
        run: |
          base="${{ github.base_ref }}"
          head="${{ github.head_ref }}"
          echo "PR: $head -> $base"
          case "$base" in
            beta)
              if [ "$head" = "dev" ] || [[ "$head" == hotfix/* ]] || [[ "$head" == release-please--* ]]; then
                echo "OK: $head may be promoted into beta"
                exit 0
              fi
              echo "::error::PRs into 'beta' must come from 'dev', 'hotfix/*', or 'release-please--*' (got '$head')"
              exit 1
              ;;
            main)
              if [ "$head" = "beta" ] || [[ "$head" == hotfix/* ]] || [[ "$head" == release-please--* ]]; then
                echo "OK: $head may be promoted into main"
                exit 0
              fi
              echo "::error::PRs into 'main' must come from 'beta', 'hotfix/*', or 'release-please--*' (got '$head')"
              exit 1
              ;;
          esac

