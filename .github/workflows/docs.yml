name: Docs
on:
  pull_request:
    branches: [beta, main]
  push:
    branches: [dev, beta, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] mkdocs-material mkdocs-macros-plugin mike playwright pillow
      - name: Cache Playwright browsers
        if: github.event_name == 'push' && (github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/main')
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium
      - name: Capture screenshots (push to beta/main only)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/main')
        run: |
          playwright install --with-deps chromium
          python scripts/capture_docs_screenshots.py
      - name: Build site (strict)
        run: mkdocs build --strict --site-dir _site

  deploy:
    name: deploy-docs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    # Single shared concurrency group across all branches so simultaneous
    # pushes to beta + main don't race each other on the gh-pages branch.
    # cancel-in-progress=false queues them; Pages itself only ever serves
    # one HEAD anyway.
    concurrency:
      group: docs-deploy-gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] mkdocs-material mkdocs-macros-plugin mike playwright pillow
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium
      - name: Install Playwright (skips download if cached)
        run: playwright install --with-deps chromium
      - name: Capture screenshots
        run: python scripts/capture_docs_screenshots.py
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Compute version slug
        id: ver
        run: |
          ver=$(python -c "import outfitpi; print(outfitpi.__version__)")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          # Major.minor only (drop patch + prerelease suffix) to keep aliases tidy.
          short=$(echo "$ver" | sed -E 's/^([0-9]+\.[0-9]+).*/\1/')
          echo "short=$short" >> "$GITHUB_OUTPUT"
      - name: Deploy to mike (main = latest)
        if: github.ref == 'refs/heads/main'
        run: |
          mike deploy --push --update-aliases "${{ steps.ver.outputs.short }}" latest
          mike set-default --push latest
      - name: Deploy to mike (beta)
        if: github.ref == 'refs/heads/beta'
        run: |
          mike deploy --push --update-aliases "${{ steps.ver.outputs.short }}-beta" beta

