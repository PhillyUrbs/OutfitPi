name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: summary
    attributes: { label: Summary }
    validations: { required: true }
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What problem does this solve? Who benefits?
    validations: { required: true }
  - type: textarea
    id: solution
    attributes: { label: Proposed solution }
  - type: textarea
    id: alternatives
    attributes: { label: Alternatives considered }
  - type: dropdown
    id: contribute
    attributes:
      label: Are you willing to contribute a PR?
      options:
        - "Yes"
        - "Maybe, with guidance"
        - "No, just suggesting"
    validations: { required: true }
