version: 2
updates:
  # Python runtime deps
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: dev
    commit-message:
      prefix: "build"
      include: scope
    labels:
      - dependencies
    groups:
      python-minor:
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    target-branch: dev
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
    groups:
      actions-minor:
        update-types: ["minor", "patch"]
